<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StepTracker PRO</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="top-bar">
    <h1>👣 StepTracker</h1>
    <button id="logoutBtn" class="logout-mini">Sair</button>
  </header>

  <section class="rings-container">

    <div class="ring move">
      <div class="ring-inner">
        <h2 id="steps">0</h2>
        <span>Move</span>
      </div>
    </div>

    <div class="ring exercise">
      <div class="ring-inner small">
        <span>Exercise</span>
      </div>
    </div>

    <div class="ring stand">
      <div class="ring-inner small">
        <span>Stand</span>
      </div>
    </div>

  </section>

  <p class="email" id="userEmail"></p>

  <section class="action-card">
    <input type="number" id="addSteps" placeholder="Adicionar passos">
    <button id="addBtn">Adicionar</button>
  </section>

</div>

<script type="module" src="dashboard.js"></script>
</body>
</html>
